name: .NET Core Desktop

on:
  push:
    branches: [ "main", "feature/lxc-headless" ]
  pull_request:
    branches: [ "main", "feature/lxc-headless" ]

permissions:
  contents: write

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.read_version.outputs.current_version }}
      version_changed: ${{ steps.compare_versions.outputs.version_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Read Current Version
        id: read_version
        run: |
          CURRENT_VERSION=$(grep 'public const string Version' SysBot.Pokemon/Helpers/PokeBot.cs | sed 's/.*Version = "\(.*\)";/\1/')
          echo "Current version is $CURRENT_VERSION"
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
      - name: Compare Versions
        id: compare_versions
        run: |
          CURRENT_VERSION=${{ env.CURRENT_VERSION }}
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Last tag: $LAST_TAG"
          echo "Current version: $CURRENT_VERSION"

          if git rev-parse "$CURRENT_VERSION" >/dev/null 2>&1; then
            echo "Tag $CURRENT_VERSION already exists, no new release needed."
            echo "version_changed=false" >> $GITHUB_OUTPUT
          else
            echo "Tag $CURRENT_VERSION does not exist, creating new release."
            echo "version_changed=true" >> $GITHUB_OUTPUT
          fi

  # ─── Windows Build (main branch only) ───────────────────────────────────────
  build-windows:
    needs: version-check
    if: needs.version-check.outputs.version_changed == 'true' && github.ref_name == 'main'
    runs-on: windows-latest
    env:
      Project_Name: SysBot.Pokemon.WinForms/SysBot.Pokemon.WinForms.csproj
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v2
      - name: Restore dependencies
        run: dotnet restore ${{ env.Project_Name }} --runtime win-x64
      - name: Build
        run: dotnet build ${{ env.Project_Name }} --configuration Release --no-restore
      - name: Publish
        run: dotnet publish ${{ env.Project_Name }} --configuration Release --output ./publish /p:PublishSingleFile=true /p:SelfContained=false /p:RuntimeIdentifier=win-x64
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ZEFusionBot-Windows
          path: ./publish

  create-release-windows:
    needs: [version-check, build-windows]
    if: needs.version-check.outputs.version_changed == 'true' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read Current Version
        run: |
          CURRENT_VERSION=$(grep 'public const string Version' SysBot.Pokemon/Helpers/PokeBot.cs | sed 's/.*Version = "\(.*\)";/\1/')
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
      - name: Get Recent Changes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          LAST_REF=$( [ -z "$LAST_TAG" ] && git rev-list --max-parents=0 HEAD || echo "$LAST_TAG" )
          RECENT_CHANGES=$(git log --pretty=format:"- %s" --first-parent $LAST_REF..HEAD)
          echo "RECENT_CHANGES<<EOF" >> $GITHUB_ENV
          echo "$RECENT_CHANGES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: ZEFusionBot-Windows
          path: ./publish
      - name: Create Windows Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.CURRENT_VERSION }}
          name: Release ${{ env.CURRENT_VERSION }}
          body: |
            ## Recent Changes
            ${{ env.RECENT_CHANGES }}
          files: ./publish/ZE_FusionBot.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN_FUSION_NEW }}

  # ─── Linux Build (feature/lxc-headless branch only) ─────────────────────────
  build-linux:
    needs: version-check
    if: needs.version-check.outputs.version_changed == 'true' && github.ref_name == 'feature/lxc-headless'
    runs-on: ubuntu-latest
    env:
      Project_Name: SysBot.Pokemon.ConsoleApp/SysBot.Pokemon.ConsoleApp.csproj
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore ${{ env.Project_Name }} --runtime linux-x64
      - name: Publish
        run: dotnet publish ${{ env.Project_Name }} --configuration Release --output ./publish-linux /p:PublishSingleFile=true /p:SelfContained=false /p:RuntimeIdentifier=linux-x64
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ZEFusionBot-Linux
          path: ./publish-linux/SysBot.Pokemon.ConsoleApp

  create-release-linux:
    needs: [version-check, build-linux]
    if: needs.version-check.outputs.version_changed == 'true' && github.ref_name == 'feature/lxc-headless'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read Current Version
        run: |
          CURRENT_VERSION=$(grep 'public const string Version' SysBot.Pokemon/Helpers/PokeBot.cs | sed 's/.*Version = "\(.*\)";/\1/')
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
      - name: Get Recent Changes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          LAST_REF=$( [ -z "$LAST_TAG" ] && git rev-list --max-parents=0 HEAD || echo "$LAST_TAG" )
          RECENT_CHANGES=$(git log --pretty=format:"- %s" --first-parent $LAST_REF..HEAD)
          echo "RECENT_CHANGES<<EOF" >> $GITHUB_ENV
          echo "$RECENT_CHANGES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: ZEFusionBot-Linux
          path: ./publish-linux
      - name: Create Linux Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.CURRENT_VERSION }}
          name: Release ${{ env.CURRENT_VERSION }} (Linux)
          body: |
            ## Recent Changes
            ${{ env.RECENT_CHANGES }}
          files: ./publish-linux/SysBot.Pokemon.ConsoleApp
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN_FUSION_NEW }}
